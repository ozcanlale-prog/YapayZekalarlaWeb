<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Hava Durumu Panosu</title>
    
    <!-- Tailwind CSS (Modern Stiller İçin) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Phosphor Icons (Süper Modern) -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <style>
        body {
            background-image: url('https://images.unsplash.com/photo-1542224566-6e85f2e6772f?q=80&w=2560&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Inter', sans-serif;
        }

        .glass-panel {
            background: rgba(15, 20, 30, 0.4);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.6);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .fade-in { animation: fadeIn 0.7s cubic-bezier(0.4, 0, 0.2, 1); }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98) translateY(15px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen text-white relative">

    <div class="fixed inset-0 bg-gradient-to-br from-slate-900/70 via-slate-900/50 to-black/80 z-0 pointer-events-none"></div>

    <main class="relative z-10 w-full min-h-screen py-10 px-4 md:px-8 flex items-center justify-center">
        
        <div class="glass-panel w-full max-w-[1200px] rounded-[2.5rem] p-6 lg:p-10 flex flex-col">
            
            <!-- Arama Çubuğu -->
            <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4 w-full">
                <div class="w-full md:w-3/4 lg:w-1/2 relative">
                    <i class="ph ph-magnifying-glass absolute left-5 top-1/2 -translate-y-1/2 text-xl text-white/60"></i>
                    <input type="text" id="cityInput" placeholder="Şehir ara... (Örn: İzmir, London, Tokyo)" 
                        class="w-full bg-white/10 hover:bg-white/15 focus:bg-white/20 border border-white/20 rounded-full py-4 pl-14 pr-6 text-white placeholder-white/60 focus:outline-none focus:ring-2 focus:ring-white/40 transition-all shadow-inner backdrop-blur-sm">
                </div>
                <button id="searchBtn" class="w-full md:w-auto bg-blue-500/80 hover:bg-blue-500 text-white border border-blue-400/50 px-8 py-4 rounded-full font-semibold transition-all flex items-center justify-center gap-2 shadow-lg hover:shadow-blue-500/30">
                    <i class="ph ph-target text-xl"></i>
                    Şehri Bul
                </button>
            </div>

            <!-- Hata & Yükleme Durumları -->
            <div id="errorMessage" class="hidden text-red-100 bg-red-500/20 border border-red-500/50 p-4 rounded-xl mb-4 text-center font-medium"></div>
            <div id="loading" class="hidden my-20">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-t-2 border-blue-400 mx-auto"></div>
                <p class="text-center mt-4 text-white/70">Hava durumu verileri çekiliyor...</p>
            </div>

            <!-- İÇERİK IZGARASI -->
            <div id="weatherContent" class="hidden grid-cols-1 xl:grid-cols-12 gap-8 fade-in">
                
                <!-- SOL PANEL -->
                <div class="col-span-1 xl:col-span-4 glass-card rounded-[2rem] p-8 flex flex-col justify-center relative overflow-hidden shadow-2xl">
                    <div class="absolute -top-32 -right-32 w-72 h-72 bg-blue-500/30 rounded-full blur-[80px] pointer-events-none"></div>
                    <div class="absolute -bottom-32 -left-32 w-72 h-72 bg-purple-500/20 rounded-full blur-[80px] pointer-events-none"></div>
                    
                    <div class="relative z-10 flex flex-col items-center text-center h-full justify-between py-4">
                        <div>
                            <h2 id="cityNameDisplay" class="text-4xl font-extrabold tracking-tight mb-2 drop-shadow-md">--</h2>
                            <p id="currentDateDisplay" class="text-white/80 font-medium text-lg">--</p>
                        </div>
                        
                        <div class="my-6 relative">
                            <i id="currentIcon" class="ph-fill ph-sun text-[10rem] drop-shadow-[0_0_30px_rgba(255,255,255,0.4)]"></i>
                        </div>
                        
                        <div>
                            <div class="flex items-start justify-center ml-4">
                                <span id="tempDisplay" class="text-[5.5rem] font-bold leading-none tracking-tighter">--</span>
                                <span class="text-4xl font-light mt-3">°C</span>
                            </div>
                            <p id="descDisplay" class="text-2xl font-medium mt-4 bg-white/10 px-6 py-2 rounded-full border border-white/10 inline-block shadow-sm">--</p>
                        </div>
                    </div>
                </div>

                <!-- SAĞ PANEL -->
                <div class="col-span-1 xl:col-span-8 flex flex-col gap-8">
                    
                    <!-- Ekstra Göstergeler -->
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                        <div class="glass-card rounded-3xl p-5 flex flex-col items-center text-center gap-1 hover:bg-white/10 transition duration-300">
                            <i class="ph ph-thermometer text-3xl text-white/80 mb-1"></i>
                            <span class="text-white/60 text-sm font-medium">Hissedilen</span>
                            <span class="text-2xl font-semibold" id="feelsLikeDisplay">--</span>
                        </div>
                        <div class="glass-card rounded-3xl p-5 flex flex-col items-center text-center gap-1 hover:bg-white/10 transition duration-300">
                            <i class="ph ph-drop text-3xl text-blue-300/80 mb-1"></i>
                            <span class="text-white/60 text-sm font-medium">Nem Oranı</span>
                            <span class="text-2xl font-semibold" id="humidityDisplay">--</span>
                        </div>
                        <div class="glass-card rounded-3xl p-5 flex flex-col items-center text-center gap-1 hover:bg-white/10 transition duration-300">
                            <i class="ph ph-wind text-3xl text-gray-300/80 mb-1"></i>
                            <span class="text-white/60 text-sm font-medium">Rüzgar Hızı</span>
                            <span class="text-2xl font-semibold"><span id="windDisplay">--</span> km/s</span>
                        </div>
                        <div class="glass-card rounded-3xl p-5 flex flex-col items-center text-center gap-1 hover:bg-white/10 transition duration-300">
                            <i class="ph ph-sun-dim text-3xl text-yellow-300/80 mb-1"></i>
                            <span class="text-white/60 text-sm font-medium">UV İndeksi</span>
                            <span class="text-2xl font-semibold" id="uvDisplay">--</span>
                        </div>
                    </div>

                    <!-- Saatlik Tahmin -->
                    <div class="glass-card rounded-[2rem] p-6 lg:p-8 flex flex-col shadow-lg border border-white/5 relative bg-gradient-to-br from-white/10 to-transparent">
                        <div class="flex items-center gap-3 mb-6 border-b border-white/10 pb-4">
                            <i class="ph ph-clock text-2xl text-blue-300"></i>
                            <h3 class="text-lg font-semibold tracking-wide text-white/90 uppercase text-sm">24 Saatlik Zaman Çizelgesi</h3>
                        </div>
                        <!-- Kaydırılabilir Container -->
                        <div class="flex overflow-x-auto gap-3 pb-4 no-scrollbar scroll-smooth" id="hourlyForecastContainer"></div>
                    </div>

                    <!-- 7 Gün Tahmini -->
                    <div class="glass-card rounded-[2rem] p-6 lg:p-8 flex flex-col shadow-lg border border-white/5 bg-gradient-to-t from-white/5 to-transparent">
                        <div class="flex items-center gap-3 mb-6 border-b border-white/10 pb-4">
                            <i class="ph ph-calendar text-2xl text-purple-300"></i>
                            <h3 class="text-lg font-semibold tracking-wide text-white/90 uppercase text-sm">Önümüzdeki 7 Gün Tahmini</h3>
                        </div>
                        <div class="flex flex-col gap-1" id="dailyForecastContainer"></div>
                    </div>

                </div>
            </div>
        </div>
    </main>

    <script>
        // DOM Element Tanımlamaları
        const cityInput = document.getElementById('cityInput');
        const searchBtn = document.getElementById('searchBtn');
        const weatherContent = document.getElementById('weatherContent');
        const loading = document.getElementById('loading');
        const errorMessage = document.getElementById('errorMessage');

        // Sabit Değişkenler ve Çeviriler
        const günAdlari = ["Pazar", "Pazartesi", "Salı", "Çarşamba", "Perşembe", "Cuma", "Cumartesi"];
        const ayAdlari = ["Ocak", "Şubat", "Mart", "Nisan", "Mayıs", "Haziran", "Temmuz", "Ağustos", "Eylül", "Ekim", "Kasım", "Aralık"];
        
        const wmoCodes = {
            0: { text: "Açık", icon: "ph-sun" },
            1: { text: "Çoğunlukla Açık", icon: "ph-cloud-sun" },
            2: { text: "Parçalı Bulutlu", icon: "ph-cloud" },
            3: { text: "Kapalı", icon: "ph-clouds" },
            45: { text: "Sisli", icon: "ph-cloud-fog" },
            48: { text: "Kırağılı Sis", icon: "ph-cloud-fog" },
            51: { text: "Hafif Çisenti", icon: "ph-cloud-rain" },
            53: { text: "Orta Çisenti", icon: "ph-cloud-rain" },
            55: { text: "Yoğun Çisenti", icon: "ph-cloud-rain" },
            61: { text: "Hafif Yağmurlu", icon: "ph-cloud-rain" },
            63: { text: "Yağmurlu", icon: "ph-cloud-rain" },
            65: { text: "Şiddetli Yağmur", icon: "ph-cloud-lightning" },
            71: { text: "Hafif Kar Yağışlı", icon: "ph-cloud-snow" },
            73: { text: "Kar Yağışlı", icon: "ph-cloud-snow" },
            75: { text: "Yoğun Kar", icon: "ph-snowing" },
            77: { text: "Kar Taneleri", icon: "ph-snowflake" },
            80: { text: "Hafif Sağanak", icon: "ph-cloud-rain" },
            81: { text: "Sağanak Yağış", icon: "ph-cloud-lightning" },
            82: { text: "Şiddetli Sağanak", icon: "ph-cloud-lightning" },
            85: { text: "Kar Sağanağı", icon: "ph-cloud-snow" },
            86: { text: "Yoğun Kar Sağanağı", icon: "ph-snowing" },
            95: { text: "Fırtına", icon: "ph-lightning" },
            96: { text: "Dolulu Fırtına", icon: "ph-cloud-lightning" },
            99: { text: "Şiddetli Fırtına", icon: "ph-cloud-lightning" }
        };

        function getFormattedDate(date) {
            return `${date.getDate()} ${ayAdlari[date.getMonth()]} ${günAdlari[date.getDay()]}`;
        }

        // Tıklama ve Klavye Olayları
        cityInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                searchBtn.click();
            }
        });

        searchBtn.addEventListener('click', () => {
            const city = cityInput.value.trim();
            if (city) {
                fetchWeatherData(city);
            }
        });

        // Hava Durumu Çekirdek İşlevi
        async function fetchWeatherData(cityName) {
            
            // UI Durumunu Hazırlama
            weatherContent.classList.add('hidden');
            errorMessage.classList.add('hidden');
            loading.classList.remove('hidden');

            try {
                // 1. Koordinatları Bul
                const geoUrl = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(cityName)}&count=1&language=tr&format=json`;
                const geoRes = await fetch(geoUrl);
                
                if (!geoRes.ok) throw new Error("Konum servislerine bağlanılamadı.");
                const geoData = await geoRes.json();

                if (!geoData.results || geoData.results.length === 0) {
                    throw new Error("Aradığınız şehir bulunamadı.");
                }

                const location = geoData.results[0];
                const lat = location.latitude;
                const lon = location.longitude;
                const displayCityName = `${location.name}, ${location.country_code || ''}`;

                // 2. Hava Durumu Verilerini Çek (Garanti raw url kullanımı)
                const weatherUrl = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&hourly=temperature_2m,relativehumidity_2m,apparent_temperature,uv_index,weathercode&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=auto`;
                const weatherRes = await fetch(weatherUrl);
                
                if (!weatherRes.ok) throw new Error("Hava durumu verisi alınamadı.");
                const weatherData = await weatherRes.json();

                // 3. Arayüzü Güncelle ve Çiz
                renderUI(displayCityName, weatherData);

                // Yükleniyoru kaldır, ızgarayı göster
                loading.classList.add('hidden');
                weatherContent.classList.remove('hidden');
                weatherContent.classList.add('grid');

            } catch (error) {
                console.error("Hava Durumu Hatası: ", error);
                loading.classList.add('hidden');
                errorMessage.textContent = "⚠️ " + error.message;
                errorMessage.classList.remove('hidden');
            }
        }

        function renderUI(cityName, data) {
            const current = data.current_weather || {};
            const hourly = data.hourly || {};
            const daily = data.daily || {};

            // Olası uyuşmazlıklara karşı güvenli zaman yakalama mimarisi (2024-03-27T14:15 vb.)
            const prefixHourStr = current.time ? current.time.substring(0, 13) : ""; 
            
            // Eğer verilerde şimdiki saati bulamazsa 0. indeksten başla ki kilitlenmesin
            let currentIdx = hourly.time ? hourly.time.findIndex(t => t.startsWith(prefixHourStr)) : 0;
            if (currentIdx === -1) currentIdx = 0;

            const now = new Date(); // Bilgisayarın yerel saati
            const wInfo = wmoCodes[current.weathercode] || { text: "Bilinmiyor", icon: "ph-question" };

            // Sol Panel Verileri
            document.getElementById('cityNameDisplay').textContent = cityName;
            document.getElementById('currentDateDisplay').textContent = getFormattedDate(now);
            document.getElementById('tempDisplay').textContent = current.temperature !== undefined ? Math.round(current.temperature) : "--";
            document.getElementById('descDisplay').textContent = wInfo.text;
            document.getElementById('currentIcon').className = `ph-fill ${wInfo.icon} text-[10rem] drop-shadow-[0_0_30px_rgba(255,255,255,0.4)] text-white`;

            // Ek Göstergeler (Güvenli Çekim)
            if (hourly.apparent_temperature && hourly.apparent_temperature[currentIdx] !== undefined) {
                document.getElementById('feelsLikeDisplay').textContent = Math.round(hourly.apparent_temperature[currentIdx]) + "°C";
                document.getElementById('humidityDisplay').textContent = "%" + hourly.relativehumidity_2m[currentIdx];
                document.getElementById('uvDisplay').textContent = Math.round(hourly.uv_index[currentIdx]);
            } else {
                document.getElementById('feelsLikeDisplay').textContent = "--";
                document.getElementById('humidityDisplay').textContent = "--";
                document.getElementById('uvDisplay').textContent = "--";
            }
            document.getElementById('windDisplay').textContent = current.windspeed !== undefined ? current.windspeed : "--";

            // Saatlik Tahmin Render (24 Saat)
            const hourlyContainer = document.getElementById('hourlyForecastContainer');
            hourlyContainer.innerHTML = ''; 
            
            if (hourly.time && hourly.time.length > 0) {
                for (let i = currentIdx; i < currentIdx + 24; i++) {
                    if (i >= hourly.time.length) break; 
                    
                    const timeStr = hourly.time[i];
                    // Saati parçala 2024-03-27T14:00 -> 14:00
                    const hourDisplay = i === currentIdx ? "Şimdi" : (timeStr.split("T")[1] || "00:00");
                    const t = Math.round(hourly.temperature_2m[i]);
                    const code = hourly.weathercode[i];
                    const iconC = (wmoCodes[code] || wmoCodes[0]).icon;

                    const html = `
                        <div class="flex-shrink-0 w-[5rem] flex flex-col items-center justify-between p-3 rounded-2xl bg-white/5 border border-white/10 hover:bg-white/15 transition-all cursor-pointer backdrop-blur-sm shadow-md group ${i === currentIdx ? 'bg-white/20 border-white/30' : ''}">
                            <span class="text-xs font-semibold text-white/80 group-hover:text-white">${hourDisplay}</span>
                            <i class="ph-fill ${iconC} text-2xl my-3 text-white"></i>
                            <span class="text-lg font-bold">${t}°</span>
                        </div>
                    `;
                    hourlyContainer.insertAdjacentHTML('beforeend', html);
                }
            }

            // Günlük Tahmin Render (7 Gün)
            const dailyContainer = document.getElementById('dailyForecastContainer');
            dailyContainer.innerHTML = '';

            if (daily.time && daily.time.length > 0) {
                for (let i = 0; i < daily.time.length && i < 7; i++) {
                    const dateObj = new Date(daily.time[i]);
                    const dName = i === 0 ? "Bugün" : günAdlari[dateObj.getDay()];
                    
                    const minT = Math.round(daily.temperature_2m_min[i]);
                    const maxT = Math.round(daily.temperature_2m_max[i]);
                    const code = daily.weathercode[i];
                    const iInfo = wmoCodes[code] || wmoCodes[0];
                    const bStr = i !== Math.min(daily.time.length, 7) - 1 ? 'border-b border-white/5' : '';

                    const rowHtml = `
                        <div class="flex items-center justify-between py-4 ${bStr} hover:bg-white/5 transition-colors px-2 rounded-xl group">
                            <span class="w-[30%] md:w-[20%] text-left font-medium text-white/90 text-sm sm:text-base">${dName}</span>
                            <div class="flex-1 flex items-center justify-center gap-2">
                                <i class="ph-fill ${iInfo.icon} text-lg text-white"></i>
                                <span class="hidden sm:inline-block text-sm text-white/70">${iInfo.text}</span>
                            </div>
                            <div class="w-[40%] flex items-center justify-end gap-2 text-sm sm:text-base">
                                <span class="text-white/60 font-medium w-6 text-right">${minT}°</span>
                                <div class="hidden sm:block w-20 h-1.5 rounded-full bg-gradient-to-r from-blue-400 via-indigo-500 to-red-400 opacity-80 backdrop-blur-md"></div>
                                <span class="text-white font-bold w-6 text-left">${maxT}°</span>
                            </div>
                        </div>
                    `;
                    dailyContainer.insertAdjacentHTML('beforeend', rowHtml);
                }
            }
        }

        // Açılışta çalıştır
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => { fetchWeatherData('İstanbul'); }, 300); 
        });

    </script>
</body>
</html>
